<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Контакты | SheetStudioUA</title>
	<meta name="description"
		content="Связь с разработчиком Google Таблиц для бизнеса в Украине. Телефон, Telegram, Viber.">
	<link rel="stylesheet" href="/style.css">
</head>

<body>

	<div class="container">

		<nav>
			<a href="/">Главная</a>
			<a href="crm.html">CRM</a>
			<a href="finance.html">Финансовый учет</a>
			<a href="automation.html">Автоматизация</a>
			<a href="custom-development.html">На заказ</a>
			<a href="contacts.html">Контакты</a>
			<a href="/ua/contacts.html" class="lang">UA</a>
		</nav>

		<div class="section contacts-wrapper">

			<div class="contacts-row">

				<a href="https://t.me/SheetStudioUA" target="_blank" class="contact-link">
					<img src="/telegram.png" alt="Telegram">
				</a>

				<a href="viber://chat?number=%2B380635398065" class="contact-link">
					<img src="/viber.png" alt="Viber">
				</a>

				<a href="tel:+380730943234" class="contact-link">
					<img src="/phone.png" alt="Телефон">
					<span class="phone-number">(073) 094 32 34</span>
				</a>

			</div>

		</div>

	</div>

	<script>
		const sections = document.querySelectorAll('.section');

		const observer = new IntersectionObserver(entries => {
			entries.forEach(entry => {
				if (entry.isIntersecting) {
					entry.target.classList.add('visible');
				}
			});
		}, { threshold: 0.15 });

		sections.forEach(section => {
			observer.observe(section);
		});
	</script>

</body>

</html>
